version: 2

multi-ecosystem-groups:
  tooling:
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - tooling

updates:
  - directory: /
    package-ecosystem: npm
    multi-ecosystem-group: tooling
    open-pull-requests-limit: 1
    patterns:
      - "*"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - tooling
    groups:
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
  - directory: /
    package-ecosystem: github-actions
    multi-ecosystem-group: tooling
    open-pull-requests-limit: 1
    patterns:
      - "*"
    schedule:
      interval: weekly
      day: monday
      time: "09:00"
      timezone: Europe/Berlin
    labels:
      - dependencies
      - tooling
    groups:
      github-actions-security:
        applies-to: security-updates
        patterns:
          - "*"
