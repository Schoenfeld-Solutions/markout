name: Build and Publish GitHub Pages

on:
  push:
    branches:
      - main
      - release/production
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Install Dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run check

  package-site:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Resolve release channel refs
        id: resolve_refs
        env:
          EVENT_BEFORE: ${{ github.event.before }}
          REF_NAME: ${{ github.ref_name }}
          ZERO_SHA: 0000000000000000000000000000000000000000
        run: |
          git fetch origin main release/production --depth=1 || git fetch origin main --depth=1
          git rev-parse --verify origin/main >/dev/null

          echo "beta_ref=origin/main" >> "$GITHUB_OUTPUT"

          if git rev-parse --verify origin/release/production >/dev/null 2>&1; then
            echo "production_ref=origin/release/production" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$REF_NAME" = "main" ] && [ -n "$EVENT_BEFORE" ] && [ "$EVENT_BEFORE" != "$ZERO_SHA" ]; then
            echo "::warning::origin/release/production is missing. Falling back to the previous main commit for the production channel. Create release/production with the Promote Production workflow before the next release."
            echo "production_ref=$EVENT_BEFORE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Missing origin/release/production. Bootstrap the production channel before deploying GitHub Pages."
          exit 1

      - name: Create source worktrees
        run: |
          git worktree add --detach ./beta-source "${{ steps.resolve_refs.outputs.beta_ref }}"
          git worktree add --detach ./production-source "${{ steps.resolve_refs.outputs.production_ref }}"

      - name: Summarize release channels
        run: |
          {
            echo "### MarkOut release channels"
            echo ""
            echo "- Beta source: \`${{ steps.resolve_refs.outputs.beta_ref }}\`"
            echo "- Production source: \`${{ steps.resolve_refs.outputs.production_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install beta dependencies
        working-directory: ./beta-source
        run: npm ci

      - name: Build beta channel
        working-directory: ./beta-source
        run: npm run build

      - name: Install production dependencies
        working-directory: ./production-source
        run: npm ci

      - name: Build production channel
        working-directory: ./production-source
        run: npm run build

      - name: Package GitHub Pages artifact
        run: |
          node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types scripts/package-github-pages-site.ts \
            --beta-root ./beta-source \
            --production-root ./production-source \
            --output-root ./out

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: ./out

      - name: Configure GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: [package-site]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4

  host-smoke:
    runs-on: ubuntu-latest
    needs: [deploy]
    if: github.event_name == 'push' && vars.MARKOUT_HOST_SMOKE_ENABLED == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Install Dependencies
        run: npm ci

      - name: Write host smoke storage state
        env:
          MARKOUT_HOST_SMOKE_STORAGE_STATE_JSON: ${{ secrets.MARKOUT_HOST_SMOKE_STORAGE_STATE_JSON }}
        run: |
          if [ -z "$MARKOUT_HOST_SMOKE_STORAGE_STATE_JSON" ]; then
            echo "MARKOUT_HOST_SMOKE_STORAGE_STATE_JSON is required when MARKOUT_HOST_SMOKE_ENABLED is true."
            exit 1
          fi
          printf '%s' "$MARKOUT_HOST_SMOKE_STORAGE_STATE_JSON" > "$RUNNER_TEMP/markout-storage-state.json"

      - name: Run Outlook host smoke
        env:
          MARKOUT_HOST_SMOKE_AUTORENDER_SWITCH_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_AUTORENDER_SWITCH_SELECTOR }}
          MARKOUT_HOST_SMOKE_BROWSER_EXECUTABLE: ${{ vars.MARKOUT_HOST_SMOKE_BROWSER_EXECUTABLE }}
          MARKOUT_HOST_SMOKE_COMPOSE_URL: ${{ vars.MARKOUT_HOST_SMOKE_COMPOSE_URL }}
          MARKOUT_HOST_SMOKE_EXPECTED_TASKPANE_URL_PREFIX: ${{ github.ref_name == 'release/production' && 'https://schoenfeld-solutions.github.io/markout/outlook/taskpane.html' || 'https://schoenfeld-solutions.github.io/markout/outlook-beta/taskpane.html' }}
          MARKOUT_HOST_SMOKE_HEADLESS: "true"
          MARKOUT_HOST_SMOKE_INSERT_PANEL_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_INSERT_PANEL_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_INTRO_CONFIRM_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_INTRO_CONFIRM_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_INTRO_PANEL_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_INTRO_PANEL_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_MESSAGE_BODY_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_MESSAGE_BODY_SELECTOR }}
          MARKOUT_HOST_SMOKE_OPEN_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_OPEN_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_OPEN_BUTTON_TEXT: ${{ vars.MARKOUT_HOST_SMOKE_OPEN_BUTTON_TEXT }}
          MARKOUT_HOST_SMOKE_PREVIEW_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_PREVIEW_SELECTOR }}
          MARKOUT_HOST_SMOKE_RECIPIENT: ${{ vars.MARKOUT_HOST_SMOKE_RECIPIENT }}
          MARKOUT_HOST_SMOKE_RENDER_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_RENDER_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_SEND_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_SEND_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_SEND_BUTTON_TEXT: ${{ vars.MARKOUT_HOST_SMOKE_SEND_BUTTON_TEXT }}
          MARKOUT_HOST_SMOKE_SETTINGS_PANEL_BUTTON_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_SETTINGS_PANEL_BUTTON_SELECTOR }}
          MARKOUT_HOST_SMOKE_SENT_CONFIRMATION_TEXT: ${{ vars.MARKOUT_HOST_SMOKE_SENT_CONFIRMATION_TEXT }}
          MARKOUT_HOST_SMOKE_STORAGE_STATE: ${{ runner.temp }}/markout-storage-state.json
          MARKOUT_HOST_SMOKE_TASKPANE_FRAME_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_TASKPANE_FRAME_SELECTOR }}
          MARKOUT_HOST_SMOKE_TASKPANE_READY_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_TASKPANE_READY_SELECTOR }}
          MARKOUT_HOST_SMOKE_TIMEOUT_MS: ${{ vars.MARKOUT_HOST_SMOKE_TIMEOUT_MS }}
          MARKOUT_HOST_SMOKE_TO_FIELD_SELECTOR: ${{ vars.MARKOUT_HOST_SMOKE_TO_FIELD_SELECTOR }}
        run: npm run test:host-smoke
