name: Build and Publish GitHub Pages

on:
  push:
    branches:
      - main
      - release/production
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: github-pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Install Dependencies
        run: npm ci

      - name: Run quality gates
        run: npm run check

  validate-release-branches:
    runs-on: ubuntu-latest
    needs: [build]

    outputs:
      beta_ref: ${{ steps.refs.outputs.beta_ref }}
      production_ref: ${{ steps.refs.outputs.production_ref }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release channel refs
        id: refs
        run: |
          git fetch origin main release/production --depth=1
          git rev-parse --verify origin/main >/dev/null

          if ! git rev-parse --verify origin/release/production >/dev/null 2>&1; then
            echo "Missing origin/release/production. Refusing to publish GitHub Pages without an explicit production source branch."
            exit 1
          fi

          echo "beta_ref=origin/main" >> "$GITHUB_OUTPUT"
          echo "production_ref=origin/release/production" >> "$GITHUB_OUTPUT"

  package-site:
    runs-on: ubuntu-latest
    needs: [validate-release-branches]

    permissions:
      attestations: write
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Create source worktrees
        run: |
          git worktree add --detach ./beta-source "${{ needs.validate-release-branches.outputs.beta_ref }}"
          git worktree add --detach ./production-source "${{ needs.validate-release-branches.outputs.production_ref }}"

      - name: Summarize release channels
        run: |
          {
            echo "### MarkOut release channels"
            echo ""
            echo "- Beta source: \`${{ needs.validate-release-branches.outputs.beta_ref }}\`"
            echo "- Production source: \`${{ needs.validate-release-branches.outputs.production_ref }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install beta dependencies
        working-directory: ./beta-source
        run: npm ci

      - name: Build beta channel
        working-directory: ./beta-source
        run: npm run build

      - name: Install production dependencies
        working-directory: ./production-source
        run: npm ci

      - name: Build production channel
        working-directory: ./production-source
        run: npm run build

      - name: Package GitHub Pages artifact
        run: |
          node --disable-warning=MODULE_TYPELESS_PACKAGE_JSON --experimental-strip-types scripts/package-github-pages-site.ts \
            --beta-root ./beta-source \
            --production-root ./production-source \
            --output-root ./out

      - name: Generate SBOM
        run: |
          npm --prefix ./beta-source sbom --sbom-format cyclonedx --omit dev > ./out/sbom-beta.cdx.json
          npm --prefix ./production-source sbom --sbom-format cyclonedx --omit dev > ./out/sbom-production.cdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-sbom
          path: ./out/sbom-*.cdx.json

      - name: Attest GitHub Pages artifact provenance
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ./out

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: site-build
          path: ./out

      - name: Configure GitHub Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    runs-on: ubuntu-latest
    needs: [package-site]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    permissions:
      contents: read
      id-token: write
      pages: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages site
        id: deployment
        uses: actions/deploy-pages@v4
