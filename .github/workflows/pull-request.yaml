name: Pull Request Gates

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: pull-request-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate-pr-title:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.x

      - name: Validate Conventional Commit pull request title
        env:
          MARKOUT_COMMIT_SUBJECT: ${{ github.event.pull_request.title }}
        run: npm run check:pr-title

  dependency-review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v6
      - name: Review dependency changes
        uses: actions/dependency-review-action@v4

  quality:
    runs-on: ubuntu-latest
    needs: [validate-pr-title, dependency-review]

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          cache: npm
          node-version: 25.x

      - name: Install Dependencies
        run: npm ci

      - name: Run repository, build, and coverage gates
        run: npm run check:ci

      - name: Run taskpane UI gate
        run: npm run test:taskpane-ui
