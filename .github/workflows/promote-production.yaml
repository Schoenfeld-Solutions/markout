name: Promote Production Channel

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Commit SHA from main to promote into release/production
        required: true
      beta_verification_confirmed:
        description: Confirm manual OWA beta verification was completed for source_sha
        required: true
        type: boolean
      beta_verification_notes:
        description: Short human verification note, for example tester, date, and checked flows
        required: true

permissions:
  actions: read
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    outputs:
      release_run_url: ${{ steps.release_evidence.outputs.release_run_url }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Validate promotion target
        env:
          BETA_VERIFICATION_CONFIRMED: ${{ inputs.beta_verification_confirmed }}
          BETA_VERIFICATION_NOTES: ${{ inputs.beta_verification_notes }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          test -n "$SOURCE_SHA" || {
            echo "source_sha is required."
            exit 1
          }

          if [ "$BETA_VERIFICATION_CONFIRMED" != "true" ]; then
            echo "Manual OWA beta verification must be confirmed for the exact source_sha before production promotion."
            exit 1
          fi

          test -n "$BETA_VERIFICATION_NOTES" || {
            echo "beta_verification_notes is required."
            exit 1
          }

          git fetch origin main release/production --depth=1
          git rev-parse --verify "$SOURCE_SHA^{commit}" >/dev/null
          git merge-base --is-ancestor "$SOURCE_SHA" origin/main || {
            echo "The requested source_sha is not reachable from origin/main."
            exit 1
          }

          if ! git rev-parse --verify origin/release/production >/dev/null 2>&1; then
            echo "Missing origin/release/production. Bootstrap production before promoting."
            exit 1
          fi

          git merge-base --is-ancestor origin/release/production "$SOURCE_SHA" || {
            echo "The requested source_sha is not a fast-forward from origin/release/production."
            exit 1
          }

      - name: Verify successful beta deployment evidence
        id: release_evidence
        uses: actions/github-script@v8
        with:
          script: |
            const sourceSha = `${{ inputs.source_sha }}`;
            const { owner, repo } = context.repo;
            const workflowRuns = await github.rest.actions.listWorkflowRunsForRepo({
              owner,
              repo,
              branch: "main",
              event: "push",
              head_sha: sourceSha,
              per_page: 50,
              status: "completed",
            });

            const releaseRun = workflowRuns.data.workflow_runs.find((run) => {
              return (
                run.name === "Build and Publish GitHub Pages" &&
                run.head_sha === sourceSha &&
                run.conclusion === "success"
              );
            });

            if (releaseRun === undefined) {
              core.setFailed(
                "No successful Build and Publish GitHub Pages push run was found for the requested main SHA. Beta deployment evidence and manual OWA verification must be complete before promotion."
              );
              return;
            }

            core.setOutput("release_run_url", releaseRun.html_url);

  promote:
    runs-on: ubuntu-latest
    needs: [validate]
    environment:
      name: production-promotion

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js environment
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 25.x

      - name: Mint release bot token
        id: release_bot
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          MARKOUT_RELEASE_BOT_APP_ID: ${{ secrets.MARKOUT_RELEASE_BOT_APP_ID }}
          MARKOUT_RELEASE_BOT_PRIVATE_KEY: ${{ secrets.MARKOUT_RELEASE_BOT_PRIVATE_KEY }}
        run: npm run mint:release-bot-token

      - name: Promote release/production
        env:
          BETA_VERIFICATION_NOTES: ${{ inputs.beta_verification_notes }}
          RELEASE_BOT_TOKEN: ${{ steps.release_bot.outputs.token }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          git fetch origin main release/production --depth=1
          git remote set-url origin "https://x-access-token:${RELEASE_BOT_TOKEN}@github.com/${{ github.repository }}.git"
          git push origin "$SOURCE_SHA:refs/heads/release/production"
          {
            echo "### Production promotion"
            echo ""
            echo "- Promoted SHA: \`$SOURCE_SHA\`"
            echo "- Target branch: \`release/production\`"
            echo "- Beta release evidence: ${{ needs.validate.outputs.release_run_url }}"
            echo "- Manual beta verification: confirmed"
            printf -- "- Verification notes: %s\n" "$BETA_VERIFICATION_NOTES"
          } >> "$GITHUB_STEP_SUMMARY"
